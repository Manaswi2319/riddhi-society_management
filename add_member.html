<!DOCTYPE html>
<html>
<head>
    <title>Add Member</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4>Add New Member</h4>
                    </div>
                    <div class="card-body">
                        <form method="POST">
                            <div class="mb-3">
                                <label>Flat No</label>
                                <input type="text" name="flat_no" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Owner Name</label>
                                <input type="text" name="owner_name" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Family Members</label>
                                <input type="number" name="family_members" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Phone</label>
                                <input type="text" name="phone" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label>Email</label>
                                <input type="email" name="email" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label>Parking Slot</label>
                                <input type="text" name="parking_slot" class="form-control">
                            </div>
                            <button type="submit" class="btn btn-primary">Save Member</button>
                            <a href="/members" class="btn btn-secondary">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

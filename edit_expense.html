{% extends "admin_base.html" %}

{% block title %}Edit Expense{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-warning text-white">
                <h4 class="mb-0"><i class="fas fa-edit"></i> Edit Expense</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label>Expense Type</label>
                        <input type="text" name="expense_type" value="{{ expense.expense_type }}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Description</label>
                        <textarea name="description" class="form-control" rows="3">{{ expense.description }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label>Amount (₹)</label>
                        <input type="number" step="0.01" name="amount" value="{{ expense.amount }}" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-warning">Update Expense</button>
                    <a href="/admin/expenses" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

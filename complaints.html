<!DOCTYPE html>
<html>
<head>
    <title>Complaints - Riddhi Society</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand">📝 Complaint Management</span>
            <a href="/dashboard" class="btn btn-light">Back to Dashboard</a>
        </div>
    </nav>
    
    <div class="container mt-4">
        <div class="card">
            <div class="card-header">
                <h4>Complaint List</h4>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>Flat No</th>
                                <th>Type</th>
                                <th>Description</th>
                                <th>Status</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for complaint in complaints %}
                            <tr>
                                <td>{{ complaint.flat_no }}</td>
                                <td>{{ complaint.complaint_type }}</td>
                                <td>{{ complaint.description }}</td>
                                <td>
                                    <span class="badge {% if complaint.status == 'Pending' %}bg-warning{% else %}bg-success{% endif %}">
                                        {{ complaint.status }}
                                    </span>
                                </td>
                                <td>{{ complaint.created_at.strftime('%Y-%m-%d') }}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

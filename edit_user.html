{% extends "admin_base.html" %}

{% block title %}Edit User{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-warning text-white">
                <h4 class="mb-0"><i class="fas fa-edit"></i> Edit User</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label>Username</label>
                        <input type="text" value="{{ user.username }}" class="form-control" disabled>
                    </div>
                    <div class="mb-3">
                        <label>Full Name *</label>
                        <input type="text" name="full_name" value="{{ user.full_name }}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>New Password (leave blank to keep same)</label>
                        <input type="password" name="password" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>User Type *</label>
                        <select name="user_type" class="form-control" required>
                            <option value="resident" {% if user.user_type == 'resident' %}selected{% endif %}>Resident</option>
                            <option value="staff" {% if user.user_type == 'staff' %}selected{% endif %}>Staff</option>
                            <option value="tenant" {% if user.user_type == 'tenant' %}selected{% endif %}>Tenant</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Role *</label>
                        <select name="role" class="form-control" required>
                            <option value="member" {% if user.role == 'member' %}selected{% endif %}>Member</option>
                            <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Flat No</label>
                        <input type="text" name="flat_no" value="{{ user.flat_no }}" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" name="email" value="{{ user.email }}" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>Phone</label>
                        <input type="text" name="phone" value="{{ user.phone }}" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-warning">Update User</button>
                    <a href="/admin/users" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

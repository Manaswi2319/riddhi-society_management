<!DOCTYPE html>
<html>
<head>
    <title>Members - Riddhi Society</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand">🏢 Member Management</span>
            <a href="/dashboard" class="btn btn-light">Back to Dashboard</a>
        </div>
    </nav>
    
    <div class="container mt-4">
        <div class="card">
            <div class="card-header">
                <h4>Member List</h4>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>Flat No</th>
                                <th>Owner Name</th>
                                <th>Family Members</th>
                                <th>Phone</th>
                                <th>Email</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for member in members %}
                            <tr>
                                <td>{{ member.flat_no }}</td>
                                <td>{{ member.owner_name }}</td>
                                <td>{{ member.family_members }}</td>
                                <td>{{ member.phone }}</td>
                                <td>{{ member.email }}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
